name: 3A. Scrape Connections

on:
  workflow_dispatch: # Sirf manual execution ke liye
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraping-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP (TUN Global Mode)
      run: |
        # 1. Repository aur GPG Key set karein
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        # 2. Install
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # 3. Start Service
        sudo systemctl start warp-svc
        sleep 2
        
        # 4. Register (New CLI Syntax compatible)
        warp-cli --accept-tos registration new || warp-cli registration new
        
        # 5. STRICT FIX: Mode ko PROXY se badal kar TUN (Standard VPN) karein
        # Yeh pure GitHub runner ka internet traffic WARP se routing kar dega
        warp-cli --accept-tos mode warp || warp-cli mode warp
        
        # 6. Connect
        warp-cli --accept-tos connect || warp-cli connect
        sleep 5
        
        # 7. Verify ki pure system ka IP change hua ya nahi
        curl https://cloudflare.com/cdn-cgi/trace

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv requests
        playwright install chromium --with-deps

    - name: Run Scraper Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
      run: |
        python scrape_connections.py

    - name: Upload Failure Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore

    - name: Commit and Push Scraped Data
      if: success()
      run: |
        git add scraped_connections.json
        # Check agar file change hui hai ya nahi
        if git diff --staged --quiet; then
          echo "[INFO] No changes detected in pipeline state files. Skipping push."
        else
          echo "[OK] Changes detected. Committing dynamic state..."
          git commit -m "Automated: Fresh target post state updated [skip ci]"
          git push origin ${GITHUB_REF_NAME}
        fi